name: yrvi

x-python-env: &python-env
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  YRVI_CONTAINERIZED: "1"
  YRVI_DATA_DIR: /data
  # TRADING_MODE here is only the FIRST-BOOT seed. Once the app has written
  # /data/gw_trading_mode, the shared entrypoint takes the mode from that file
  # and this value is ignored — upgrades reset .env.compose to the committed
  # default, so it must never be authoritative after install.
  TRADING_MODE: ${TRADING_MODE:-paper}
  IBKR_HOST: ib_gateway
  #
  # Deliberately NOT passed here, so a stale .env.compose cannot reach the app:
  #   IBKR_PORT    — DERIVED from the trading mode by the entrypoint
  #                  (4003=live, 4004=paper inside the Docker network). Passing
  #                  it separately is what let the port and mode disagree.
  #   IBKR_CLIENT_ID — set by the entrypoint; the other ids (2-5) are already
  #                  hardcoded in config.py, 1 was the odd one out.
  #   RENDER_URL   — baked in config.py; identical on every deployment.
  # See docker/entrypoint-secrets.sh, which logs anything it ignores.
  #
  # AUTO_RESTART_* are first-boot seeds only: settings.json wins at runtime
  # (_in_auto_restart_window) and /data/gw_auto_restart_time wins in the gateway.
  AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-11:59 PM}
  AUTO_RESTART_SUPPRESS_SECS: ${AUTO_RESTART_SUPPRESS_SECS:-1800}

services:
  secrets:
    build: ./docker/secrets_service
    container_name: yrvi-secrets-1
    ports:
      # Loopback-bound like every other service. The host mapping exists ONLY so a
      # browser on this machine can open the Secrets Setup UI at localhost:8001 —
      # every in-stack consumer reaches it as http://secrets:8001 over the Docker
      # network, which does not use this mapping. Do not widen to 0.0.0.0: this
      # service fronts the IBKR credentials.
      - "127.0.0.1:8001:8001"
    volumes:
      - yrvi_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ib_gateway:
    build:
      context: ./docker/ib-gateway
      args:
        IB_GATEWAY_TAG: ${IB_GATEWAY_TAG:-latest}
    container_name: ib_gateway
    restart: "no"
    entrypoint: ["/usr/local/bin/yrvi-gw-entrypoint.sh"]
    command: ["/home/ibgateway/scripts/run.sh"]
    depends_on:
      secrets:
        condition: service_healthy
    environment:
      # TWS_USERID and VNC_SERVER_PASSWORD are fetched from the secrets container
      # at startup by yrvi-gw-entrypoint.sh — not injected here.
      # First-boot seed only — /data/gw_trading_mode wins once it exists.
      TRADING_MODE: ${TRADING_MODE:-paper}
      TIME_ZONE: ${TIME_ZONE:-America/Los_Angeles}
      TZ: ${TIME_ZONE:-America/Los_Angeles}
      #
      # The values below are LITERALS, not ${...}, so a stale .env.compose cannot
      # change them. None of them is a setting an operator should ever tune:
      #
      #   READ_ONLY_API      this app places orders — "yes" silently breaks every
      #                      execution path. It was already commented "must be no".
      #   ALLOW_BLIND_TRADING trading without market data is never what we want.
      #   TWS_ACCEPT_INCOMING the api/scheduler must be able to connect at all.
      #   EXISTING_SESSION_DETECTED_ACTION 'primary' keeps THIS session when IBKR
      #                      reports a competing login, rather than yielding it.
      #
      # 2FA timeout handling: an unanswered IB Key push must leave the gateway
      # retrying, never parked — on 2026-07-17 a push arrived at 10:35 PM, went
      # untapped, and the gateway sat dead for 26 hours across a whole weekend.
      # 'restart' (not 'exit') because this service is `restart: "no"`, which is
      # deliberate so a credential failure can't loop into an IBKR lockout — but
      # it also means an exiting gateway never comes back on its own.
      # The entrypoint enforces both of these on the IBC template as well, so
      # they hold even on a box whose .env.compose predates this change.
      READ_ONLY_API: "no"
      ALLOW_BLIND_TRADING: "no"
      TWS_ACCEPT_INCOMING: "accept"
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      TWOFA_TIMEOUT_ACTION: "restart"
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      TWOFA_EXIT_INTERVAL: "60"
      # First-boot seed only — /data/gw_auto_restart_time wins once it exists.
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-11:59 PM}
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
    volumes:
      - ib_gateway_settings:/home/ibgateway/Jts
      - yrvi_data:/data
    ports:
      - "127.0.0.1:${IB_GATEWAY_LIVE_PORT:-4001}:4003"
      - "127.0.0.1:${IB_GATEWAY_PAPER_PORT:-4002}:4004"
      - "127.0.0.1:${IB_GATEWAY_VNC_PORT:-5900}:5900"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: yrvi-api:local
    restart: unless-stopped
    depends_on:
      ib_gateway:
        condition: service_started
      secrets:
        condition: service_healthy
    environment:
      <<: *python-env
    volumes:
      - yrvi_data:/data
      # docker.sock lets the api restart/stop sibling containers.
      # ":ro" marks the socket file read-only but does NOT restrict
      # Docker API commands — the api has effectively root on the host.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # host_repo gives git pull access to the live host filesystem so upgrades
      # update real source files (the container's /app is a baked build snapshot).
      - .:/host_repo
    ports:
      - "127.0.0.1:${YRVI_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    image: yrvi-scheduler:local
    restart: unless-stopped
    depends_on:
      ib_gateway:
        condition: service_started
      secrets:
        condition: service_healthy
    environment:
      <<: *python-env
    volumes:
      - yrvi_data:/data
    healthcheck:
      test: ["CMD", "python3", "/app/docker/healthcheck-scheduler.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: yrvi-app/Dockerfile
    image: yrvi-web:local
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${YRVI_WEB_PORT:-3000}:80"

  # Browser-accessible, VIEW-ONLY window into the IB Gateway GUI. Bridges the
  # Gateway's existing x11vnc display (ib_gateway:5900) to noVNC over websockify.
  # See docs/view-gateway.md. Bound to 127.0.0.1; the dashboard proxies it at
  # /viewer/, so it is reachable exactly where the dashboard is and nowhere else.
  #
  # Core, NOT opt-in (v5.2.69). It used to sit behind a "viewer" profile, which
  # made it invisible to `compose build` — so the upgrade never rebuilt it and
  # changes to it silently didn't deploy for five releases, while the dashboard
  # reported success. It costs ~22MB and 0.01% CPU (the gateway it watches costs
  # 1GB), and gating a troubleshooting tool behind an on-demand build meant the
  # first click could stall on a 539MB image build at the exact moment something
  # was wrong. Always-on is both simpler and cheaper than the gate was.
  view-gateway:
    build:
      context: ./docker/view-gateway
    container_name: yrvi-view-gateway
    restart: unless-stopped
    depends_on:
      ib_gateway:
        condition: service_started
      secrets:
        condition: service_healthy
    environment:
      GATEWAY_VNC_HOST: ib_gateway
      GATEWAY_VNC_PORT: "5900"
      VIEW_GATEWAY_INTERNAL_PORT: "6080"
      # Where to fetch the vnc_server_password secret to auto-fill the viewer.
      SECRETS_BASE: http://secrets:8001/secret
    ports:
      - "127.0.0.1:${VIEW_GATEWAY_PORT:-6080}:6080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6080/vnc.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ib_gateway_settings:
  yrvi_data:
