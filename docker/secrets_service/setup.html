<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YRVI — Secrets Setup</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #2f81f7;
    --ok: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .container {
    width: 100%;
    max-width: 640px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header .logo {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  header h1 {
    margin: 6px 0 4px 0;
    font-size: 24px;
    font-weight: 600;
  }
  header .sub {
    color: var(--muted);
    font-size: 14px;
  }
  .banner {
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .banner.complete {
    border-color: var(--ok);
    background: rgba(63, 185, 80, 0.08);
    color: var(--ok);
    font-weight: 600;
  }
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin: 24px 0 10px 0;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 8px; }
  details.advanced { margin-top: 28px; }
  details.advanced > summary {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    list-style: none;
  }
  details.advanced > summary::-webkit-details-marker { display: none; }
  details.advanced > summary::before {
    content: "▸\00a0";
    display: inline-block;
    transition: transform 0.15s ease;
  }
  details.advanced[open] > summary::before { content: "▾\00a0"; }
  details.advanced > summary:hover { color: var(--fg); }
  .advanced-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin: 12px 0 4px 0;
  }
  .field-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .field {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .field-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .field-label {
    font-weight: 600;
    font-size: 14px;
  }
  .field-required {
    font-size: 11px;
    color: var(--muted);
    margin-left: 6px;
    font-weight: 400;
  }
  .field-status {
    font-size: 12px;
    color: var(--muted);
  }
  .field-status.ok { color: var(--ok); }
  .field-status.warn { color: var(--warn); }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .input-wrap {
    position: relative;
    flex: 1;
  }
  input[type="password"], input[type="text"] {
    width: 100%;
    background: #0d1117;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 60px 8px 10px;
    font-size: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 6px;
  }
  .toggle:hover { color: var(--text); }
  button.save {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  button.save:hover { background: #1f6feb; }
  button.save:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .save-msg {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    min-height: 14px;
  }
  .save-msg.ok { color: var(--ok); }
  .save-msg.err { color: var(--danger); }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">YRVI</div>
      <h1>You Rock Volatility Income Fund</h1>
      <div class="sub">Encrypted secrets setup</div>
    </header>

    <div id="banner" class="banner">
      Loading status…
    </div>

    <div id="fields"></div>
  </div>

<script>
// Grouped by what actually gates the install, mirroring the app's Secrets page.
// The four below are exactly main.py's REQUIRED_SECRETS — the same set preflight
// checks — so finishing them is the whole job here. Everything else is optional
// and is better set in the app, where it can be changed later without a terminal.
//
// Install is ALWAYS paper-first: live credentials are added in the app and the
// mode is switched from the dashboard. preflight.sh refuses a live install for
// this reason, so live fields must never be presented as required here.
//
// discord_webhook_weekly_plan is deliberately absent: it is a FILE-based secret
// (/run/secrets/…, read by the entrypoint), not one this service stores, so
// POST /secret/discord_webhook_weekly_plan returned 404 "unknown secret" and the
// field could never be saved.
const SECTIONS = [
  {
    title: "Required secrets",
    secrets: [
      { name: "account_paper",     label: "IBKR Paper Account ID",       required: true, hint: "e.g. DU123456" },
      { name: "tws_userid_paper",  label: "IBKR Paper Username",         required: true, hint: "Your IBKR login username — not the account ID" },
      { name: "tws_password_paper", label: "IBKR Paper Trading Password", required: true },
      { name: "render_secret",     label: "Render Screener API Secret",   required: true },
    ],
  },
  {
    title: "Advanced — not needed to get started",
    advanced: true,
    note: "You can finish setup without any of these. Add them later in the "
        + "dashboard under Secrets, where they can also be changed. "
        + "<strong>Trading live?</strong> Complete this paper setup first, then add "
        + "your live credentials in the app and switch to Live from the dashboard.",
    secrets: [
      { name: "account_live",       label: "IBKR Live Account ID",        required: false, hint: "Only for live trading — add in the app instead" },
      { name: "tws_userid_live",    label: "IBKR Live Username",          required: false, hint: "Only for live trading — add in the app instead" },
      { name: "tws_password_live",  label: "IBKR Live Trading Password",  required: false, hint: "Only for live trading — add in the app instead" },
      { name: "vnc_server_password", label: "VNC Password",               required: false, hint: "Defaults to ibgateway123!test (loopback only)" },
      { name: "discord_webhook_url", label: "Discord Webhook URL",        required: false, hint: "Alerts and weekly results" },
    ],
  },
];

const SECRETS = SECTIONS.flatMap(s => s.secrets);

const fieldsEl = document.getElementById("fields");
const bannerEl = document.getElementById("banner");

function buildField(s) {
  const wrap = document.createElement("div");
  wrap.className = "field";
  wrap.innerHTML = `
    <div class="field-header">
      <div>
        <span class="field-label">${s.label}</span>
        <span class="field-required">${s.required ? "(required)" : "(optional)"}</span>
      </div>
      <div class="field-status" id="status-${s.name}">—</div>
    </div>
    <div class="input-row">
      <div class="input-wrap">
        <input type="password" id="input-${s.name}" autocomplete="off" placeholder="Enter value" />
        <button type="button" class="toggle" data-target="input-${s.name}">Show</button>
      </div>
      <button type="button" class="save" data-name="${s.name}">Save</button>
    </div>
    ${s.hint ? `<div class="field-hint">${s.hint}</div>` : ""}
    <div class="save-msg" id="msg-${s.name}"></div>
  `;
  return wrap;
}

SECTIONS.forEach(sec => {
  if (!sec.advanced) {
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = sec.title;
    fieldsEl.appendChild(title);
    sec.secrets.forEach(s => fieldsEl.appendChild(buildField(s)));
    return;
  }
  // Collapsed by default so the page shows only what gates the install, but
  // still reachable: if the dashboard itself will not start, this page is the
  // only UI left for fixing a credential.
  const details = document.createElement("details");
  details.className = "advanced";
  const summary = document.createElement("summary");
  summary.textContent = sec.title;
  details.appendChild(summary);
  if (sec.note) {
    const note = document.createElement("div");
    note.className = "advanced-note";
    note.innerHTML = sec.note;
    details.appendChild(note);
  }
  sec.secrets.forEach(s => details.appendChild(buildField(s)));
  fieldsEl.appendChild(details);
});

document.querySelectorAll(".toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    const input = document.getElementById(btn.dataset.target);
    if (input.type === "password") {
      input.type = "text";
      btn.textContent = "Hide";
    } else {
      input.type = "password";
      btn.textContent = "Show";
    }
  });
});

document.querySelectorAll("button.save").forEach(btn => {
  btn.addEventListener("click", () => saveSecret(btn.dataset.name));
});

async function saveSecret(name) {
  const input = document.getElementById(`input-${name}`);
  const msg = document.getElementById(`msg-${name}`);
  const value = input.value;
  msg.textContent = "Saving…";
  msg.className = "save-msg";
  try {
    const res = await fetch(`/secret/${name}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ value }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    msg.textContent = "Saved";
    msg.className = "save-msg ok";
    input.value = "";
    refreshStatus();
    setTimeout(() => { msg.textContent = ""; }, 2000);
  } catch (err) {
    msg.textContent = `Error: ${err.message}`;
    msg.className = "save-msg err";
  }
}

async function refreshStatus() {
  try {
    const res = await fetch("/secrets/status");
    const data = await res.json();
    SECRETS.forEach(s => {
      const el = document.getElementById(`status-${s.name}`);
      const state = data.secrets[s.name];
      if (state === "set") {
        el.textContent = "✅ saved";
        el.className = "field-status ok";
      } else if (s.required) {
        el.textContent = "⚠️ required";
        el.className = "field-status warn";
      } else {
        el.textContent = "— optional";
        el.className = "field-status";
      }
    });
    if (data.complete) {
      bannerEl.className = "banner complete";
      bannerEl.textContent = "✅ Setup complete — return to terminal to continue";
    } else {
      bannerEl.className = "banner";
      bannerEl.textContent = "Required secrets must be set before the stack can start.";
    }
  } catch (err) {
    bannerEl.className = "banner";
    bannerEl.textContent = `Status unavailable: ${err.message}`;
  }
}

refreshStatus();
setInterval(refreshStatus, 3000);
</script>
</body>
</html>
