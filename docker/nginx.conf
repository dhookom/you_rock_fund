server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The /api/screener dry-run connects to IBKR and warms up a cold Render
        # instance, legitimately taking 1-2 min. nginx's 60s default returned 504
        # before it finished. Keep these above the frontend's 150s axios timeout
        # so the client (with its clean error message) is the controlling limit.
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
