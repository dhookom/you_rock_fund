server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The /api/screener dry-run connects to IBKR and warms up a cold Render
        # instance, legitimately taking 1-2 min. nginx's 60s default returned 504
        # before it finished. Keep these above the frontend's 150s axios timeout
        # so the client (with its clean error message) is the controlling limit.
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    # View Gateway viewer, proxied onto the dashboard's OWN origin instead of its
    # own host port. The viewer container binds 127.0.0.1:6080, which is reachable
    # only from the box itself — so a phone (or anything off-box) could never load
    # it, even over a private overlay, because `tailscale serve` publishes just the
    # dashboard's :3000. Riding /viewer/ on this origin means the viewer follows
    # the dashboard wherever it is already reachable, with no per-box config and
    # nothing new exposed. See docs/view-gateway.md.
    #
    # The variable + resolver is what lets nginx START when the viewer container is
    # absent — it is opt-in (compose profile "viewer"), and a literal upstream name
    # would fail resolution at boot and take the whole dashboard down with it. Same
    # trick as /api/ above.
    location = /viewer { return 301 /viewer/; }

    location /viewer/ {
        set $vg_upstream view-gateway:6080;
        rewrite ^/viewer/(.*)$ /$1 break;
        proxy_pass http://$vg_upstream;

        # noVNC talks VNC over a websocket; without the Upgrade dance the page
        # loads but the screen never paints.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A viewer sits idle by design — you open it to WATCH for a dialog. nginx's
        # 60s default would silently drop the stream while you are looking at it.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
