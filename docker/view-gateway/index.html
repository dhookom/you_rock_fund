<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YRVI · View Gateway</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1115; color: #e6e6e6;
    }
    .card {
      max-width: 460px; width: 90%; padding: 32px 28px; border-radius: 14px;
      background: #171a21; box-shadow: 0 8px 40px rgba(0,0,0,.45); text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub { font-size: 13px; color: #9aa4b2; margin: 0 0 24px; }
    a.btn {
      display: block; text-decoration: none; padding: 14px 18px; border-radius: 10px;
      font-weight: 600; margin: 10px 0; transition: filter .15s;
    }
    a.btn:hover { filter: brightness(1.12); }
    .primary { background: #2f6feb; color: #fff; }
    .danger { background: transparent; color: #e0a23c; border: 1px solid #6b5320; font-weight: 500; font-size: 14px; }
    .note { font-size: 12px; color: #77808e; margin-top: 20px; line-height: 1.5; }
    code { background: #232733; padding: 1px 6px; border-radius: 5px; font-size: 12px; }
    /* Hidden unless served under the dashboard's /viewer/ proxy — see the script
       at the end of the body. 44px tall: Apple's minimum thumb target, and on a
       phone this is the only way back. */
    #back {
      display: none; align-items: center; justify-content: center; gap: 6px;
      min-height: 44px; margin: 0 0 18px; padding: 0 14px; border-radius: 10px;
      background: transparent; border: 1px solid #2a2f3a; color: #9aa4b2;
      text-decoration: none; font-size: 13px;
    }
    #back.show { display: inline-flex; }
  </style>
</head>
<body>
  <div class="card">
    <!-- The way back to the dashboard. On a phone this page opens INSIDE the
         installed web app, which has no browser chrome and therefore no back
         button — without this you have to force-quit the app to escape. -->
    <a id="back" href="/">← Dashboard</a>

    <h1>IB Gateway — View Gateway</h1>
    <p class="sub">Inspect the IB Gateway screen (login, 2FA, dialogs, status).</p>

    <!-- VIEW-ONLY is the default: noVNC will not send any pointer/keyboard events.
         view.html auto-fills the VNC password, so no prompt. -->
    <a class="btn primary" href="view.html">
      👁  Open viewer (view-only)
    </a>

    <!-- CONTROL is deliberate and clearly marked, so accidental clicks/typing are unlikely. -->
    <a class="btn danger" href="view.html?control=1"
       onclick="return confirm('Enable KEYBOARD + MOUSE control of IB Gateway?\n\nClicks and typing WILL be sent to the live Gateway. Only use this to complete a login or 2FA prompt.');">
      ⚠️  Enable keyboard / mouse control
    </a>

    <p class="note">
      Password auto-fills from the <code>vnc_server_password</code> secret.<br>
      Reachable only where the dashboard is — no port of its own is published.
    </p>
  </div>

  <script>
    // Only offer "← Dashboard" when the dashboard is actually on this origin —
    // i.e. behind its /viewer/ proxy. Served straight off the viewer's own :6080
    // the dashboard is on a different port, so the link would be a dead end;
    // there you have browser chrome to go back with anyway.
    if (location.pathname.startsWith('/viewer/')) {
      document.getElementById('back').classList.add('show');
    }
  </script>
</body>
</html>
