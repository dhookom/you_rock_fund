# ─────────────────────────────────────────────────────────────
#  IBC Configuration — You Rock Volatility Income Fund
#  Generated by setup_ibc.sh from .env — do not edit by hand.
#  Re-run setup_ibc.sh after changing IBKR credentials in .env.
# ─────────────────────────────────────────────────────────────

[IBC]

# ── Credentials ───────────────────────────────────────────────
FIX=no
IbLoginId=PLACEHOLDER_USERNAME
IbPassword=PLACEHOLDER_PASSWORD
PasswordEncrypted=no

# ── Trading mode ───────────────────────────────────────────────
# IB Gateway paper → port 4002   |   IB Gateway live → port 4001
TradingMode=PLACEHOLDER_TRADING_MODE

# ── API access ────────────────────────────────────────────────
# Auto-accept connections from localhost (127.0.0.1)
AcceptIncomingConnectionAction=accept
# Port must match IBKR_PORT in .env
ForceTwsApiPort=PLACEHOLDER_PORT
# Ensure Read-Only API is off — without this friends would have to manually
# uncheck "Read-Only API" in IB Gateway settings before orders work
ReadOnlyApi=no
# Bypass the order precautions confirmation dialog for API orders — without
# this, every order hangs waiting for a GUI click that never comes
BypassOrderPrecautions=yes

# ── Session handling ──────────────────────────────────────────
# If another session is already logged in, take over silently
ExistingSessionDetectedAction=primaryonly

# Keep daily restart dialog from blocking the API at 11:45 PM
ResetOrderIdsAtOpen=no
AutoRestartTime=11:59 PM

# ── UI / behaviour ────────────────────────────────────────────
MinimizeMainWindow=yes
SendTWSLogsToConsole=no
ShowAllTrades=no
ReadOnlyLogin=no

# ── Two-factor auth ───────────────────────────────────────────
# Set to yes only if using IBKR mobile 2FA (requires manual intervention)
UseLoginIdAsHandlerId=no
